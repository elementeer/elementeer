name: Test Plugin Activation

on:
  push:
    branches: [main]
    paths:
      - '**.php'
      - 'composer.json'
      - 'vendor/**'
  workflow_dispatch:

jobs:
  test:
    name: PHP Syntax + Activation Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          coverage: none
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict

      - name: PHP Syntax Check (all files)
        run: |
          errors=0
          while IFS= read -r -d '' file; do
            php -l "$file" || errors=$((errors + 1))
          done < <(find . -name '*.php' -not -path './vendor/*' -not -path './.git/*' -print0)
          if [ "$errors" -gt 0 ]; then
            echo "::error::Syntax errors found in $errors file(s)"
            exit 1
          fi
          echo "✅ All PHP files pass syntax check"

      - name: WordPress Activation Simulation
        run: |
          cat > /tmp/test-activation.php <<'PHPEOF'
          <?php
          // Simulate minimal WordPress environment for plugin activation
          define('WP_DEBUG', true);
          define('ABSPATH', '/tmp/');

          // Stub WordPress functions
          if (!function_exists('add_action')) { function add_action($h, $c, $p=10, $a=1) {} }
          if (!function_exists('did_action')) { function did_action($tag) { return true; } }
          if (!function_exists('register_activation_hook')) { function register_activation_hook($f, $c) {} }
          if (!function_exists('register_deactivation_hook')) { function register_deactivation_hook($f, $c) {} }
          if (!function_exists('plugin_basename')) { function plugin_basename($f) { return basename(dirname($f)).'/'.basename($f); } }
          if (!function_exists('plugin_dir_path')) { function plugin_dir_path($f) { return dirname($f).'/'; } }
          if (!function_exists('plugin_dir_url')) { function plugin_dir_url($f) { return 'https://example.com/wp-content/plugins/'.basename(dirname($f)).'/'; } }
          if (!function_exists('plugins_url')) { function plugins_url($p='', $f='') { return 'https://example.com/wp-content/plugins/'.$p; } }
          if (!function_exists('esc_url')) { function esc_url($u) { return $u; } }
          if (!function_exists('esc_html')) { function esc_html($t) { return $t; } }
          if (!function_exists('esc_attr')) { function esc_attr($t) { return $t; } }
          if (!function_exists('esc_html_e')) { function esc_html_e($t, $domain='') { echo $t; } }
          if (!function_exists('wp_kses_post')) { function wp_kses_post($d) { return $d; } }
          if (!function_exists('sanitize_text_field')) { function sanitize_text_field($t) { return $t; } }
          if (!function_exists('get_option')) { function get_option($k, $d=null) { return $d; } }
          if (!function_exists('update_option')) { function update_option($k, $v) { return true; } }
          if (!function_exists('get_bloginfo')) { function get_bloginfo($s='') { return 'test'; } }
          if (!function_exists('wp_upload_dir')) { function wp_upload_dir() { return ['basedir' => '/tmp', 'baseurl' => 'https://example.com']; } }
          if (!function_exists('wp_remote_get')) { function wp_remote_get($u) { return ['response' => ['code' => 200]]; } }
          if (!function_exists('is_wp_error')) { function is_wp_error($t) { return false; } }
          if (!function_exists('wp_remote_retrieve_response_code')) { function wp_remote_retrieve_response_code($r) { return 200; } }
          if (!function_exists('wp_remote_retrieve_body')) { function wp_remote_retrieve_body($r) { return '{}'; } }
          if (!function_exists('__')) { function __($t, $d='') { return $t; } }

          error_reporting(E_ALL);
          ini_set('display_errors', '1');

          echo "Loading elementeer.php...\n";
          try {
              require __DIR__ . '/elementeer.php';
              echo "✅ Plugin loaded without fatal error\n";
          } catch (Throwable $e) {
              echo "❌ FATAL: " . $e->getMessage() . "\n";
              echo "   File: " . $e->getFile() . ":" . $e->getLine() . "\n";
              exit(1);
          }
          PHPEOF
          php /tmp/test-activation.php

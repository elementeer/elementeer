name: Release Plugin

on:
  push:
    tags:
      - 'v*'

jobs:
  syntax:
    name: Syntax Check
    uses: ./.github/workflows/test-plugin.yml

  build:
    name: Build ZIP
    needs: syntax
    runs-on: ubuntu-latest
    outputs:
      zip_name: ${{ steps.build.outputs.zip_name }}
      sha256: ${{ steps.build.outputs.sha256 }}
    steps:
      - uses: actions/checkout@v4
      - name: Sync version from tag
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          sed -i "s/Version:.*/Version:     ${VERSION}/" elementeer.php
          sed -i "s/define( 'ELEMENTEER_VERSION', '[^']*' );/define( 'ELEMENTEER_VERSION', '${VERSION}' );/" elementeer.php
          echo "Patched elementeer.php to version ${VERSION}"
      - name: Build ZIP
        id: build
        run: |
          ZIP_NAME="elementeer.${{ github.ref_name }}.zip"
          git archive --format=zip --prefix=elementeer/ HEAD -o "$ZIP_NAME"
          echo "zip_name=$ZIP_NAME" >> "$GITHUB_OUTPUT"
          echo "sha256=$(sha256sum $ZIP_NAME | awk '{print $1}')" >> "$GITHUB_OUTPUT"
      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: elementeer-plugin-zip
          path: elementeer.*.zip

  wp-test:
    name: WordPress Activation Test
    needs: build
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: wordpress_root
          MYSQL_DATABASE: wordpress_test
          MYSQL_USER: wordpress
          MYSQL_PASSWORD: wordpress_pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Download ZIP
        uses: actions/download-artifact@v4
        with:
          name: elementeer-plugin-zip

      - name: Start WordPress via docker-compose
        run: |
          cat > docker-compose.yml <<'EOF'
          services:
            wordpress:
              image: wordpress:latest
              ports:
                - "8080:80"
              environment:
                WORDPRESS_DB_HOST: mysql
                WORDPRESS_DB_USER: wordpress
                WORDPRESS_DB_PASSWORD: wordpress_pass
                WORDPRESS_DB_NAME: wordpress_test
                WORDPRESS_TABLE_PREFIX: wp_
                WORDPRESS_DEBUG: 1
                WORDPRESS_CONFIG_EXTRA: |
                  define('WP_DEBUG', true);
                  define('WP_DEBUG_LOG', true);
                  define('WP_DEBUG_DISPLAY', false);
              volumes:
                - ./elementeer:/var/www/html/wp-content/plugins/elementeer
                - ./elementor:/var/www/html/wp-content/plugins/elementor
            wpcli:
              image: wordpress:cli
              depends_on:
                - wordpress
              environment:
                WORDPRESS_DB_HOST: mysql
                WORDPRESS_DB_USER: wordpress
                WORDPRESS_DB_PASSWORD: wordpress_pass
                WORDPRESS_DB_NAME: wordpress_test
              volumes:
                - ./elementeer:/var/www/html/wp-content/plugins/elementeer
                - ./elementor:/var/www/html/wp-content/plugins/elementor
              command: >
                sh -c '
                  sleep 10 &&
                  wp core install --url=http://localhost:8080 --title=Test --admin_user=admin --admin_password=admin --admin_email=test@test.com --skip-email &&
                  wp plugin install elementor --activate &&
                  chown -R www-data:www-data /var/www/html/wp-content/plugins/elementeer
                '
          EOF
          mkdir -p elementeer elementor
          unzip -q elementeer.*.zip -d elementeer/
          mv elementeer/elementeer/* elementeer/ 2>/dev/null || true
          docker compose up -d

      - name: Wait for WordPress
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080 > /dev/null 2>&1; then break; fi
            sleep 3
          done
          curl -sf http://localhost:8080 || { echo "WordPress did not start"; exit 1; }
          echo "✅ WordPress is running"

      - name: Activate Elementeer Plugin
        run: |
          docker compose run --rm wpcli wp plugin list --status=active --format=csv | grep elementeer || \
            docker compose run --rm wpcli wp plugin activate elementeer
          echo "--- Plugin activation attempted ---"

      - name: Verify Plugin Active + No Fatal Errors
        run: |
          ACTIVE=$(docker compose run --rm wpcli wp plugin list --status=active --format=json | grep -c '"name":"elementeer"' || true)
          if [ "$ACTIVE" -eq 0 ]; then
            echo "::error::Elementeer plugin is NOT active"
            echo "--- Debug: wp-content/plugins/elementeer/ ---"
            docker compose run --rm wpcli ls -la /var/www/html/wp-content/plugins/elementeer/ 2>/dev/null || true
            echo "--- WordPress debug log ---"
            docker compose run --rm wpcli cat /var/www/html/wp-content/debug.log 2>/dev/null || true
            exit 1
          fi
          echo "✅ Elementeer plugin is active"

      - name: Generate API Key + Test REST Endpoint
        run: |
          API_KEY=$(docker compose run --rm wpcli wp eval '
          $manager = \Elementeer\MCP\Auth\Manager::get_instance();
          $result = $manager->add_key(["label" => "CI Test", "capabilities" => ["*"], "is_active" => true]);
          if (!is_wp_error($result)) { echo $result["key"] ?? ""; }
          ' 2>/dev/null || true)
          if [ -z "$API_KEY" ]; then
            echo "::warning::Could not generate API key, skipping REST test"
            exit 0
          fi
          echo "API key generated: ${API_KEY:0:10}..."
          RESPONSE=$(curl -sf -H "X-Elementeer-Key: $API_KEY" http://localhost:8080/wp-json/elementeer/v1/site || echo "FAIL")
          if [ "$RESPONSE" = "FAIL" ]; then
            echo "::error::REST endpoint /wp-json/elementeer/v1/site returned failure"
            exit 1
          fi
          echo "✅ REST endpoint responds: $(echo $RESPONSE | head -c 100)"

  release:
    name: Create GitHub Release
    needs: [build, wp-test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download ZIP
        uses: actions/download-artifact@v4
        with:
          name: elementeer-plugin-zip
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Elementeer ${{ github.ref_name }}"
          files: elementeer.*.zip
          generate_release_notes: true
          body: |
            ## Elementeer ${{ github.ref_name }}

            **The agent-native Elementor growth layer.**
            GPL-2.0-or-later — WordPress Plugin Directory compatible.

            ✅ PHP syntax validated  
            ✅ WordPress activation tested  
            ✅ REST API endpoint verified  

            ### Verification
            | | |
            |---|---|
            | SHA256 | `${{ needs.build.outputs.sha256 }}` |

            ### Installation
            1. Download the ZIP
            2. Upload to WordPress → Plugins → Add New → Upload
            3. Activate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

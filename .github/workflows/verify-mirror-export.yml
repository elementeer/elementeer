name: Verify Mirror Export
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    name: Verify Mirror Contains Only Free Tier Tools
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Run Mirror Export Verification
        run: node scripts/verify-mirror-export.mjs
        env:
          # Optional environment variables
          CI: true
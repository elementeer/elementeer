name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-mcp-server:
    name: MCP Server Tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: npm run test --workspace=mcp-server
      - run: npm run lint --workspace=mcp-server

  test-shared:
    name: Shared Types (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
      - run: npm ci
      - run: npm run build --workspace=shared
      - run: npm run test --workspace=shared

  test-plugin:
    name: WordPress Plugin Tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.1', '8.2', '8.3']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer, phpunit
      - name: Install Composer deps
        working-directory: plugin
        run: composer install --no-progress --prefer-dist
      - name: Run PHPUnit
        working-directory: plugin
        run: vendor/bin/phpunit

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint --workspace=mcp-server
      - run: npm run lint --workspace=shared

name: Release
on:
  push:
    tags:
      - 'v*'
  create:
    tags:
      - 'v*'

jobs:
  validate:
    runs-on: ubuntu-latest
    container: php:8.2-cli-alpine
    steps:
      - name: Install checkout deps
        run: apk add --no-cache git nodejs npm bash coreutils zip findutils curl jq
      - uses: actions/checkout@v4
      - name: PHP syntax check
        run: |
          errors=0
          find includes -name '*.php' | while read -r f; do php -l "$f" || exit 1; done
          echo "All PHP files pass syntax check"
      - name: Version sync gate
        run: |
          TAG="${GITHUB_REF##*/}"
          VERSION="${TAG#v}"
          HEADER_VER=$(grep "Version:" elementeer.php | head -1 | sed 's/.*Version: *//' | xargs)
          PHP_VER=$(grep "ELEMENTEER_VERSION" elementeer.php | head -1 | sed "s/.*'\(.*\)'.*/\1/" | xargs)
          echo "Tag:     $TAG"
          echo "Version: $VERSION"
          echo "Header:  $HEADER_VER"
          echo "Const:   $PHP_VER"
          if [ "$HEADER_VER" != "$VERSION" ]; then
            echo "ERROR: Header Version ($HEADER_VER) != tag ($VERSION)"
            exit 1
          fi
          if [ "$PHP_VER" != "$VERSION" ]; then
            echo "ERROR: ELEMENTEER_VERSION ($PHP_VER) != tag ($VERSION)"
            exit 1
          fi
          echo "Version sync OK: $VERSION"
      - name: Build Plugin ZIP
        run: |
          bash scripts/create-plugin-zip.sh
          ZIP=$(ls /tmp/elementeer-build-final/*/elementeer.*.zip | head -1)
          echo "ZIP=$ZIP" >> $GITHUB_ENV
      - name: Verify ZIP structure
        run: |
          unzip -l "$ZIP" | grep -q "elementeer/" || (echo "ZIP structure INVALID" && exit 1)
          echo "ZIP structure OK: $(unzip -l "$ZIP" | tail -1)"
      - name: Create Forgejo Release
        run: |
          TAG="${GITHUB_REF##*/}"
          VERSION="${TAG#v}"
          BODY=$(cat <<EOBODY
          ## Elementeer $VERSION

          The agent-native Elementor growth layer.

          - PHP syntax validated
          - Version sync confirmed
          - Plugin ZIP built and attached

          ### Installation
          1. Download the ZIP below
          2. Upload to WordPress -> Plugins -> Add New -> Upload
          3. Activate

          Canonical source: [git.langevc.com/elementeer/elementeer](https://git.langevc.com/elementeer/elementeer)
          EOBODY
          )
          curl -s -X POST "https://git.langevc.com/api/v1/repos/$GITHUB_REPOSITORY/releases" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg tag "$TAG" --arg name "Elementeer v$VERSION" --arg body "$BODY" '{tag_name: $tag, name: $name, body: $body}')" \
            > /tmp/release-response.json
          cat /tmp/release-response.json
          RELEASE_ID=$(jq -r '.id' /tmp/release-response.json)
          echo "Release created: id=$RELEASE_ID"
          echo "RELEASE_ID=$RELEASE_ID" >> $GITHUB_ENV
      - name: Upload Release Asset
        run: |
          ZIPNAME=$(basename "$ZIP")
          curl -s -X POST "https://git.langevc.com/api/v1/repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID/assets?name=$ZIPNAME" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/zip" \
            --data-binary "@$ZIP"
          echo "Asset uploaded: $ZIPNAME"
      - name: Mirror Release to GitHub
        env:
          GH_TOKEN: ${{ secrets.GH_MIRROR_TOKEN }}
        run: |
          TAG="${GITHUB_REF##*/}"
          VERSION="${TAG#v}"
          NOTES=$(cat <<'EONOTES'
          ## Elementeer {TAG}

          The agent-native Elementor growth layer.

          - PHP syntax validated
          - Version sync confirmed
          - Plugin ZIP built and attached

          ### Installation
          1. Download the ZIP below
          2. Upload to WordPress - Plugins - Add New - Upload
          3. Activate
          EONOTES
          )
          NOTES=$(echo "$NOTES" | sed "s/{TAG}/$TAG/")
          gh release create "$TAG" \
            --repo elementeer/elementeer \
            --title "Elementeer $TAG" \
            --notes "$NOTES" \
            "$ZIP#Elementeer v$VERSION - installable WordPress plugin" \
            || echo "Mirror release skipped (token may lack permissions)"

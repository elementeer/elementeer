name: Release Gate
on:
  push:
    branches: [main]

jobs:
  validate:
    # Deliberately no `container: php:8.2-cli-alpine`. actions/checkout@v4 fails
    # inside that image even with nodejs installed: it completes every git
    # operation and then exits 1 without a message, which kept this gate red for
    # 31 consecutive runs. On ubuntu-latest checkout is reliable (every mirror
    # workflow proves it), so PHP is installed here instead — 8.3 rather than 8.2,
    # which is backwards compatible for a syntax gate.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install PHP
        run: |
          apt-get update -qq
          DEBIAN_FRONTEND=noninteractive apt-get install -y -qq php-cli zip unzip
          php -v | head -1
      - name: PHP syntax check
        run: |
          # `grep -v` exits 1 when every line matches, i.e. when all files are
          # clean — so it must not be the step's last command.
          errors=$(find includes -name '*.php' -exec php -l {} \; | grep -v "No syntax errors" || true)
          if [ -n "$errors" ]; then
            echo "$errors"
            echo "PHP syntax errors found"
            exit 1
          fi
          echo "All PHP files pass syntax check"
      - name: Version Sync Gate
        run: |
          HEADER_VER=$(grep "Version:" elementeer.php | head -1 | sed 's/.*Version: *//' | xargs)
          PHP_CONST_VER=$(grep "ELEMENTEER_VERSION" elementeer.php | head -1 | sed "s/.*'\(.*\)'.*/\1/" | xargs)
          echo "Header version:    $HEADER_VER"
          echo "PHP constant:      $PHP_CONST_VER"
          if [ "$HEADER_VER" != "$PHP_CONST_VER" ]; then
            echo "ERROR: Version MISMATCH — header='$HEADER_VER' != ELEMENTEER_VERSION='$PHP_CONST_VER'"
            echo "Fix: bump both to the same version before release"
            exit 1
          fi
          echo "Version sync OK: $HEADER_VER"
      - name: Build Plugin ZIP
        run: |
          bash scripts/create-plugin-zip.sh
          ls -la /tmp/elementeer-build-final/*/
      - name: Verify ZIP structure
        run: |
          unzip -l /tmp/elementeer-build-final/*/elementeer.*.zip | grep -q "elementeer/" && echo "ZIP structure OK" || (echo "ZIP structure INVALID" && exit 1)

name: Release Gate
on:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    container: php:8.2-cli-alpine
    steps:
      # php:8.2-cli-alpine ships no node, so actions/checkout cannot run until it is
      # installed. Same pre-step the working release.yml has used since 2026-07-18.
      - name: Install checkout deps
        run: apk add --no-cache git nodejs npm bash coreutils zip findutils curl jq
      - uses: actions/checkout@v4
      - name: Install system deps
        run: |
          apk add --no-cache bash coreutils zip findutils
      - name: PHP syntax check
        run: |
          find includes -name '*.php' -exec php -l {} \; | grep -v "No syntax errors"
          echo "All PHP files pass syntax check"
      - name: Version Sync Gate
        run: |
          HEADER_VER=$(grep "Version:" elementeer.php | head -1 | sed 's/.*Version: *//' | xargs)
          PHP_CONST_VER=$(grep "ELEMENTEER_VERSION" elementeer.php | head -1 | sed "s/.*'\(.*\)'.*/\1/" | xargs)
          echo "Header version:    $HEADER_VER"
          echo "PHP constant:      $PHP_CONST_VER"
          if [ "$HEADER_VER" != "$PHP_CONST_VER" ]; then
            echo "ERROR: Version MISMATCH — header='$HEADER_VER' != ELEMENTEER_VERSION='$PHP_CONST_VER'"
            echo "Fix: bump both to the same version before release"
            exit 1
          fi
          echo "Version sync OK: $HEADER_VER"
      - name: Build Plugin ZIP
        run: |
          bash scripts/create-plugin-zip.sh
          ls -la /tmp/elementeer-build-final/*/
      - name: Verify ZIP structure
        run: |
          unzip -l /tmp/elementeer-build-final/*/elementeer.*.zip | grep -q "elementeer/" && echo "ZIP structure OK" || (echo "ZIP structure INVALID" && exit 1)
